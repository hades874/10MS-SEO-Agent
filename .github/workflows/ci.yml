name: CI

on:
  push:
    branches: [main]
  pull_request:

# Keep the latest run per ref; cancel superseded ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      # Build needs no secrets: the app boots without DATABASE_URL / AI keys and
      # degrades gracefully (lazy DB singleton, isXConfigured gates).
      - name: Build
        run: npm run build
